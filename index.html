<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Important Question 💖</title>
<style>
    body {
        margin: 0;
        font-family: 'Comic Sans MS', cursive;
        overflow: hidden;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        text-align: center; 
    }
    .heart {
        position: fixed;
        bottom: -20px;
        color: red;
        font-size: 20px;
        animation: floatUp 5s linear infinite;
    }
    @keyframes floatUp {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-100vh); opacity: 0; }
    }
    h1 { margin-top: 120px; color: white; font-size: 32px; }
    button {
        padding: 12px 20px; font-size: 16px; border: none;
        border-radius: 10px; cursor: pointer; position: absolute;
        transition: all 0.3s ease;
        z-index: 10;
    }
    #yesBtn { background-color: #ff4d6d; color: white; left: 40%; top: 55%; }
    #noBtn { background-color: #28a745; color: white; left: 55%; top: 55%; }
    .boom { font-size: 60px; animation: explode 0.7s ease-out; }
    @keyframes explode {
        0% { transform: scale(1); }
        100% { transform: scale(4); opacity: 0; }
    }
    #main-content { width: 100%; height: 100vh; }
</style>
</head>
<body>

<div id="main-content">
    <h1 id="question"></h1>
    <button id="yesBtn">Yes 😊</button>
    <button id="noBtn">Let’s stay friends 🙂</button>
</div>

<audio id="bgMusic" src="./piano_start.mp3"></audio>
<audio id="boomMusic" src="./i_can_love_you.mp3"></audio>

<script>
const bgMusic = document.getElementById("bgMusic");
const boomMusic = document.getElementById("boomMusic");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const question = document.getElementById("question");
const mainContent = document.getElementById("main-content");
let yesClickCount = 0;

// 1. Typing effect
const text = "I like you 😊 Would you be my Shine for-'ever'?";
let i = 0;
function typeWriter() {
    if (i < text.length) {
        question.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 50);
    }
}
typeWriter();

// 2. Music Start on interaction
document.body.addEventListener("click", () => {
    if (bgMusic.paused) {
        bgMusic.currentTime = 20; 
        bgMusic.loop = true;
        bgMusic.volume = 0.5;
        bgMusic.play();
    }
}, { once: true });

// 3. THE EXPLOSION FUNCTION (Reusable)
function triggerExplosion() {
    fadeOut(bgMusic);
    boomMusic.currentTime = 0;
    boomMusic.volume = 1;
    boomMusic.play();

    mainContent.innerHTML = `
        <div style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <h1 class="boom">😘🥰 Sorry Baby !!!! 😘🥰</h1>
            <h1 style="color:white;">You are my Shine! ❤️</h1>
        </div>
    `;
}

// 4. NO Button Click
noBtn.addEventListener("click", triggerExplosion);

// 5. YES Button Logic (Escapes, then Explodes)
yesBtn.addEventListener("click", () => {
    yesClickCount++;
    yesBtn.style.position = "fixed";

    if (yesClickCount < 7) {
        const x = Math.random() * (window.innerWidth - 120);
        const y = Math.random() * (window.innerHeight - 60);
        yesBtn.style.left = x + "px";
        yesBtn.style.top = y + "px";
    } 
    else if (yesClickCount === 7) {
        question.innerHTML = "Sorry, this option is invalid 😌 Wanna click me again?";
    } 
    else {
        // This is the 8th click - trigger the boom!
        triggerExplosion();
    }
});

function fadeOut(audio) {
    let vol = audio.volume;
    const fade = setInterval(() => {
        if (vol > 0.05) {
            vol -= 0.05;
            audio.volume = vol;
        } else {
            audio.pause();
            clearInterval(fade);
        }
    }, 100);
}

// 6. Hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => { heart.remove(); }, 5000);
}
setInterval(createHeart, 300);
</script>
</body>
</html>

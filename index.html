<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Important Question 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    overflow: hidden;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align: center;
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -20px;
    color: red;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-100vh);
        opacity: 0;
    }
}

h1 {
    margin-top: 120px;
    color: white;
    font-size: 32px;
}

/* Buttons */
button {
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    position: absolute;
    transition: all 0.3s ease;
}

#yesBtn {
    background-color: #ff4d6d;
    color: white;
    left: 40%;
    top: 55%;
}

#noBtn {
    background-color: #28a745;
    color: white;
    left: 55%;
    top: 55%;
}

/* Explosion */
.boom {
    font-size: 60px;
    animation: explode 0.7s ease-out;
}

@keyframes explode {
    0% { transform: scale(1); }
    100% { transform: scale(4); opacity: 0; }
}
</style>

</head>
<body>

<h1 id="question"></h1>

<button id="yesBtn">Yes 😢</button>
<button id="noBtn">No ❤️</button>

<script>
// ===== Typing effect =====
const text = "Do you wanna breakup? 💔";
let i = 0;
function typeWriter() {
    if (i < text.length) {
        document.getElementById("question").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 50);
    }
}
typeWriter();

// ===== Floating hearts =====
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}
setInterval(createHeart, 300);

// ===== Button logic =====
let yesClickCount = 0;

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const question = document.getElementById("question");

// YES button escapes
yesBtn.addEventListener("click", () => {
    yesClickCount++;

    if (yesClickCount < 7) {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 100);

        yesBtn.style.left = x + "px";
        yesBtn.style.top = y + "px";
    } 
    else if (yesClickCount === 7) {
        question.innerHTML = "Sorry, this option is invalid 😌 Wanna click me again?";
    } 
    else {
        question.innerHTML = "Sorry, you are mine 💖";
        yesBtn.style.display = "none";
        noBtn.style.display = "none";
    }
});

// NO button = explosion
noBtn.addEventListener("click", () => {
    document.body.innerHTML = `
        <h1 class="boom">💣 BOOM 💣</h1>
        <h1 style="color:white;">You are mine ❤️</h1>
    `;
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Important Question 💖</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #ffe6f0;
        overflow: hidden;
    }

    h1 {
        margin-top: 100px;
        color: #ff4d88;
    }

    button {
        padding: 12px 20px;
        font-size: 16px;
        margin: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        position: absolute;
    }

    #yesBtn {
        background-color: #ff6666;
        color: white;
        left: 40%;
        top: 50%;
    }

    #noBtn {
        background-color: #4CAF50;
        color: white;
        left: 55%;
        top: 50%;
    }

    .boom {
        font-size: 50px;
        animation: explode 0.6s ease-out;
    }

    @keyframes explode {
        0% { transform: scale(1); }
        100% { transform: scale(3); opacity: 0; }
    }
</style>
</head>
<body>

<h1 id="question">Do you wanna breakup? 💔</h1>

<button id="yesBtn">Yes 😢</button>
<button id="noBtn">No ❤️</button>

<script>
let yesClickCount = 0;

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const question = document.getElementById("question");

// YES BUTTON LOGIC (runs away)
yesBtn.addEventListener("click", () => {
    yesClickCount++;

    if (yesClickCount < 7) {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 100);

        yesBtn.style.left = x + "px";
        yesBtn.style.top = y + "px";
    } 
    else if (yesClickCount === 7) {
        question.innerText = "Sorry, this option is invalid 😌 Wanna click me again?";
    } 
    else {
        question.innerText = "Sorry, you are mine 💖";
        yesBtn.style.display = "none";
        noBtn.style.display = "none";
    }
});

// NO BUTTON LOGIC (boom 💣)
noBtn.addEventListener("click", () => {
    document.body.innerHTML = `
        <h1 class="boom">💣 BOOM 💣</h1>
        <h1>You are mine ❤️</h1>
    `;
});
</script>

</body>
</html>
